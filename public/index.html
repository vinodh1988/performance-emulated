<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MongoDB Super Analyzer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">M</span>
      <div><strong>MongoDB</strong><small>Super Analyzer</small></div>
    </div>
    <button class="nav active" data-page="overview">Overview</button>
    <button class="nav" data-page="replica">Replica Set</button>
    <button class="nav" data-page="server">Server</button>
    <button class="nav" data-page="memory">Memory</button>
    <button class="nav" data-page="storage">Storage</button>
    <button class="nav" data-page="profiler">Profiler</button>
    <button class="nav" data-page="logs">Logs</button>
    <button class="nav" data-page="mongostat">mongostat</button>
    <button class="nav" data-page="mongotop">mongotop</button>
    <button class="nav" data-page="databaseExplorer">Collections</button>
    <button class="nav" data-page="load">Custom Load</button>
    <a class="doc-link" href="/docs/tutorial.html">Tutorial</a>
  </aside>

  <main class="shell">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Overview</h1>
        <p id="pageSubtitle">Environment-driven analyzer using the MongoDB connection from server .env.</p>
      </div>
      <div class="top-actions">
        <button id="refreshPage">Refresh Page</button>
        <button id="runAll">Run Full Analysis</button>
      </div>
    </header>

    <section class="cluster-strip">
      <div><span>Replica Set</span><strong id="stripReplicaSet">Loading...</strong></div>
      <div><span>Primary</span><strong id="stripPrimary">Loading...</strong></div>
      <div><span>Members</span><strong id="stripMembers">Loading...</strong></div>
      <div><span>Lab DB</span><strong id="stripLabDb">Loading...</strong></div>
    </section>

    <section id="content" class="content"></section>
  </main>

  <template id="rawTemplate">
    <details class="raw"><summary>Raw result</summary><pre></pre></details>
  </template>

  <script src="app.js"></script>
</body>
</html>
